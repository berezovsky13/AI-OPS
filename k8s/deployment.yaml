apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: default
  labels:
    app: chatbot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      containers:
      - name: chatbot
        image: acrcandidates.azurecr.io/chatbot:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: REDIS_HOST
          value: "REDIS_HOSTNAME_FROM_TERRAFORM"  # Will be replaced by pipeline
        - name: REDIS_PORT
          value: "6380"
        - name: OPENAI_ENDPOINT
          value: "OPENAI_ENDPOINT_FROM_TERRAFORM"  # Will be replaced by pipeline
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: default
spec:
  selector:
    app: chatbot
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatbot-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbot
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80